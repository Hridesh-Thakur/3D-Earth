<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth Explorer | @Hridesh-Thakur</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #fff;
            cursor: grab;
        }

        body:active { cursor: grabbing; }

        #globe-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0; left: 0;
        }

        /* ── Header ── */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 28px 36px;
            z-index: 100;
            pointer-events: none;
        }

        .header-left h1 {
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        .header-right {
            text-align: right;
        }

        .header-right p {
            font-size: 13px;
            font-weight: 400;
            color: rgba(255,255,255,0.5);
            line-height: 1.7;
        }

        .header-right p.highlight {
            color: rgba(255,255,255,0.85);
            font-weight: 500;
        }

        .header-right a {
            color: #6ec1e4;
            text-decoration: none;
            font-size: 13px;
            pointer-events: all;
        }

        /* ── Footer Nav ── */
        .footer-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 36px;
            z-index: 100;
            pointer-events: none;
        }

        .footer-nav span {
            font-size: 12px;
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.5px;
        }

        .footer-links {
            display: flex;
            gap: 24px;
        }

        .footer-links a {
            font-size: 12px;
            color: rgba(255,255,255,0.45);
            text-decoration: none;
            pointer-events: all;
            transition: color 0.3s;
        }

        .footer-links a:hover { color: #fff; }

        /* ── Click Marker ── */
        .click-marker {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .click-marker.active { opacity: 1; }

        .click-marker::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 6px; height: 6px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .click-marker-ring {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 50;
            opacity: 0;
            animation: none;
        }

        .click-marker-ring.active {
            opacity: 1;
            animation: pulse-ring 2s ease-out infinite;
        }

        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }

        /* ── Info Panel ── */
        .info-panel {
            position: fixed;
            top: 50%;
            right: -480px;
            transform: translateY(-50%);
            width: 420px;
            max-height: 80vh;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            z-index: 200;
            transition: right 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto;
            scrollbar-width: none;
        }

        .info-panel::-webkit-scrollbar { display: none; }
        .info-panel.open { right: 36px; }

        .panel-close {
            position: absolute;
            top: 16px; right: 16px;
            width: 32px; height: 32px;
            border: none;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
            z-index: 10;
        }

        .panel-close:hover { background: rgba(255,255,255,0.15); }

        .panel-header {
            padding: 32px 28px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .panel-flag {
            font-size: 48px;
            margin-bottom: 12px;
            line-height: 1;
        }

        .panel-country {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 4px;
        }

        .panel-subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            font-weight: 400;
        }

        .panel-coords {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
            padding: 4px 10px;
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            font-family: 'SF Mono', 'Fira Code', monospace;
        }

        .panel-body { padding: 20px 28px 28px; }

        .info-section {
            margin-bottom: 20px;
        }

        .info-section:last-child { margin-bottom: 0; }

        .info-section-title {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 12px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .info-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 12px 14px;
            transition: background 0.3s;
        }

        .info-card:hover { background: rgba(255,255,255,0.07); }

        .info-card.full-width { grid-column: 1 / -1; }

        .info-card-icon {
            font-size: 20px;
            margin-bottom: 6px;
        }

        .info-card-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 3px;
        }

        .info-card-value {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.9);
            line-height: 1.4;
        }

        /* ── Prompt Tooltip ── */
        .prompt-tooltip {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 30px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            z-index: 100;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .prompt-tooltip span { color: rgba(255,255,255,0.8); }

        /* ── Search ── */
        .search-container {
            position: fixed;
            top: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 150;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            transition: all 0.3s;
        }

        .search-box:focus-within {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
        }

        .search-box svg {
            width: 14px; height: 14px;
            color: rgba(255,255,255,0.4);
            flex-shrink: 0;
        }

        .search-box input {
            border: none;
            background: transparent;
            color: #fff;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            width: 200px;
        }

        .search-box input::placeholder { color: rgba(255,255,255,0.3); }

        .search-results {
            position: absolute;
            top: calc(100% + 6px);
            left: 0; right: 0;
            background: rgba(20,20,30,0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            max-height: 260px;
            overflow-y: auto;
            display: none;
            scrollbar-width: none;
        }

        .search-results::-webkit-scrollbar { display: none; }
        .search-results.visible { display: block; }

        .search-result-item {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-result-item:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }

        .search-result-item .sr-flag { font-size: 18px; }
        .search-result-item .sr-name { flex: 1; }

        /* ── Loading ── */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: #0a0a0f;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-top: 20px;
            letter-spacing: 2px;
        }

        .loading-spinner {
            width: 40px; height: 40px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: rgba(255,255,255,0.6);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .info-panel {
                width: calc(100vw - 24px);
                right: -110vw;
                max-height: 70vh;
                top: auto;
                bottom: 12px;
                transform: none;
            }
            .info-panel.open { right: 12px; }
            .header { padding: 16px 20px; }
            .header-right { display: none; }
            .search-container { top: 16px; }
            .info-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>

/* ═══════════════════════════════════════════
   THREE.JS SCENE SETUP
   ═══════════════════════════════════════════ */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.getElementById('globe-container').appendChild(renderer.domElement);

camera.position.set(0, 0, 3.2);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 1.6;
controls.maxDistance = 8;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;
controls.enablePan = false;
controls.rotateSpeed = 0.5;

/* ── Lighting ── */
const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xfff5e8, 2.0);
sunLight.position.set(5, 3, 5);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 2048;
sunLight.shadow.mapSize.height = 2048;

const fillLight = new THREE.DirectionalLight(0x8899cc, 0.3);
fillLight.position.set(-5, -2, -3);

/* ── Texture Loading ── */
const textureLoader = new THREE.TextureLoader();
let texturesLoaded = 0;
const totalTextures = 5;

function onTextureLoad() {
    texturesLoaded++;
    if (texturesLoaded >= totalTextures) {
        setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
        }, 500);
    }
}

function onTextureError() {
    texturesLoaded++;
    if (texturesLoaded >= totalTextures) {
        setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
        }, 500);
    }
}

const dayTexture = textureLoader.load(
    'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg',
    onTextureLoad, undefined, onTextureError
);
const nightTexture = textureLoader.load(
    'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_lights_2048.png',
    onTextureLoad, undefined, onTextureError
);
const normalTexture = textureLoader.load(
    'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg',
    onTextureLoad, undefined, onTextureError
);
const specularTexture = textureLoader.load(
    'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg',
    onTextureLoad, undefined, onTextureError
);
const cloudsTexture = textureLoader.load(
    'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png',
    onTextureLoad, undefined, onTextureError
);

/* ── Earth ── */
const earthGeometry = new THREE.SphereGeometry(1, 128, 128);
const earthMaterial = new THREE.MeshPhongMaterial({
    map: dayTexture,
    specularMap: specularTexture,
    normalMap: normalTexture,
    normalScale: new THREE.Vector2(0.85, 0.85),
    shininess: 25,
    specular: new THREE.Color(0x333333)
});
const earth = new THREE.Mesh(earthGeometry, earthMaterial);
earth.castShadow = true;
earth.receiveShadow = true;

/* ── Clouds ── */
const cloudsGeometry = new THREE.SphereGeometry(1.007, 64, 64);
const cloudsMaterial = new THREE.MeshPhongMaterial({
    map: cloudsTexture,
    transparent: true,
    opacity: 0.35,
    depthWrite: false,
});
const clouds = new THREE.Mesh(cloudsGeometry, cloudsMaterial);
scene.add(clouds);

/* ── Atmosphere ── */
const atmosphereGeometry = new THREE.SphereGeometry(1.02, 64, 64);
const atmosphereMaterial = new THREE.ShaderMaterial({
    vertexShader: `
        varying vec3 vNormal;
        varying vec3 vPosition;
        void main() {
            vNormal = normalize(normalMatrix * normal);
            vPosition = (modelViewMatrix * vec4(position,1.0)).xyz;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
        }
    `,
    fragmentShader: `
        varying vec3 vNormal;
        varying vec3 vPosition;
        void main() {
            float intensity = pow(0.65 - dot(vNormal, vec3(0,0,1)), 2.0);
            vec3 color = vec3(0.3, 0.6, 1.0);
            gl_FragColor = vec4(color, 1.0) * intensity;
        }
    `,
    blending: THREE.AdditiveBlending,
    side: THREE.BackSide,
    transparent: true
});
const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
scene.add(atmosphere);

/* ── Outer glow ── */
const glowGeometry = new THREE.SphereGeometry(1.06, 32, 32);
const glowMaterial = new THREE.ShaderMaterial({
    vertexShader: `
        varying vec3 vNormal;
        void main() {
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
        }
    `,
    fragmentShader: `
        varying vec3 vNormal;
        void main() {
            float intensity = pow(0.45 - dot(vNormal, vec3(0,0,1)), 3.0);
            gl_FragColor = vec4(0.15, 0.4, 1.0, 1.0) * intensity * 0.25;
        }
    `,
    blending: THREE.AdditiveBlending,
    side: THREE.BackSide,
    transparent: true
});
scene.add(new THREE.Mesh(glowGeometry, glowMaterial));

/* ── Stars ── */
const starsGeometry = new THREE.BufferGeometry();
const starsCount = 12000;
const starsPositions = new Float32Array(starsCount * 3);
const starsColors = new Float32Array(starsCount * 3);
for (let i = 0; i < starsCount; i++) {
    const i3 = i * 3;
    starsPositions[i3]     = (Math.random() - 0.5) * 2000;
    starsPositions[i3 + 1] = (Math.random() - 0.5) * 2000;
    starsPositions[i3 + 2] = (Math.random() - 0.5) * 2000;
    const c = new THREE.Color().setHSL(Math.random() * 0.2 + 0.55, 0.3, Math.random() * 0.3 + 0.7);
    starsColors[i3] = c.r; starsColors[i3+1] = c.g; starsColors[i3+2] = c.b;
}
starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsPositions, 3));
starsGeometry.setAttribute('color', new THREE.Float32BufferAttribute(starsColors, 3));
const starsMaterial = new THREE.PointsMaterial({ size: 0.015, vertexColors: true, transparent: true, opacity: 0.8, sizeAttenuation: true });
scene.add(new THREE.Points(starsGeometry, starsMaterial));

/* ── Location Pin Group ── */
const pinGroup = new THREE.Group();
scene.add(pinGroup);

function createPin(lat, lng) {
    // Remove old pins
    while(pinGroup.children.length) pinGroup.remove(pinGroup.children[0]);

    const phi   = (90 - lat) * (Math.PI / 180);
    const theta = (lng + 180) * (Math.PI / 180);
    const r = 1.01;
    const x = -(r * Math.sin(phi) * Math.cos(theta));
    const y =  r * Math.cos(phi);
    const z =  r * Math.sin(phi) * Math.sin(theta);

    // Pin stem
    const stemGeo = new THREE.CylinderGeometry(0.003, 0.003, 0.08, 8);
    const stemMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const stem = new THREE.Mesh(stemGeo, stemMat);

    // Pin head
    const headGeo = new THREE.SphereGeometry(0.015, 16, 16);
    const headMat = new THREE.MeshBasicMaterial({ color: 0xff4444 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 0.05;

    // Glow ring
    const ringGeo = new THREE.RingGeometry(0.02, 0.035, 32);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0xff4444, transparent: true, opacity: 0.5, side: THREE.DoubleSide });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.y = 0.001;
    ring.rotation.x = -Math.PI / 2;

    const group = new THREE.Group();
    group.add(stem); group.add(head); group.add(ring);
    group.position.set(x, y, z);
    group.lookAt(0, 0, 0);
    group.rotateX(Math.PI / 2);

    pinGroup.add(group);
    return group;
}

/* ═══════════════════════════════════════════
   RAYCASTING & COUNTRY LOOKUP
   ═══════════════════════════════════════════ */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let isDragging = false;
let mouseDownPos = { x: 0, y: 0 };

renderer.domElement.addEventListener('pointerdown', (e) => {
    isDragging = false;
    mouseDownPos = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('pointermove', (e) => {
    const dx = e.clientX - mouseDownPos.x;
    const dy = e.clientY - mouseDownPos.y;
    if (Math.sqrt(dx*dx + dy*dy) > 5) isDragging = true;
});

renderer.domElement.addEventListener('pointerup', (e) => {
    if (isDragging) return;

    mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    const hits = raycaster.intersectObject(earth);
    if (hits.length > 0) {
        const point = hits[0].point;

        // Convert to lat/lng
        const lat = 90 - Math.acos(point.y) * (180 / Math.PI);
        const lng = -(Math.atan2(point.z, -point.x) * (180 / Math.PI) - 180);
        const lngN = ((lng + 540) % 360) - 180;

        // Adjust for earth rotation
        const rotY = earth.rotation.y;
        const adjustedLng = ((lngN - rotY * (180/Math.PI)) + 540) % 360 - 180;

        // Find nearest country
        const country = findNearestCountry(lat, adjustedLng);

        if (country) {
            // Show markers
            const marker = document.getElementById('clickMarker');
            const ring = document.getElementById('clickMarkerRing');
            marker.style.left = e.clientX + 'px';
            marker.style.top  = e.clientY + 'px';
            ring.style.left   = e.clientX + 'px';
            ring.style.top    = e.clientY + 'px';
            marker.classList.add('active');
            ring.classList.add('active');

            // Place 3D pin
            const pinPhi   = (90 - country.lat) * (Math.PI / 180);
            const pinTheta = (country.lng + 180) * (Math.PI / 180);
            // Account for rotation
            createPin(country.lat, country.lng + earth.rotation.y * (180/Math.PI));

            showCountryInfo(country, lat.toFixed(2), adjustedLng.toFixed(2));
            document.getElementById('promptTooltip').style.opacity = '0';

            setTimeout(() => {
                marker.classList.remove('active');
                ring.classList.remove('active');
            }, 3000);
        }
    }
});

function findNearestCountry(lat, lng) {
    let nearest = null;
    let minDist = Infinity;

    for (const c of countries) {
        const dLat = lat - c.lat;
        const dLng = lng - c.lng;
        const dist = Math.sqrt(dLat*dLat + dLng*dLng);
        if (dist < minDist) {
            minDist = dist;
            nearest = c;
        }
    }
    // Max radius check — ~25 degrees
    return minDist < 25 ? nearest : null;
}

const searchInput = document.getElementById('searchInput');

searchInput.addEventListener('input', () => {
    const q = searchInput.value.toLowerCase().trim();
    searchResults.innerHTML = '';
    if (q.length < 1) { searchResults.classList.remove('visible'); return; }

    const matches = countries.filter(c =>
        c.name.toLowerCase().includes(q) ||
        c.capital.toLowerCase().includes(q) ||
        c.code.toLowerCase() === q
    ).slice(0, 8);

    if (matches.length === 0) { searchResults.classList.remove('visible'); return; }

    matches.forEach(c => {
        const item = document.createElement('div');
        item.className = 'search-result-item';
        item.innerHTML = `<span class="sr-flag">${c.flag}</span><span class="sr-name">${c.name}</span>`;
        item.addEventListener('click', () => {
            // Rotate globe to country
            rotateToCountry(c);
            showCountryInfo(c, c.lat.toFixed(2), c.lng.toFixed(2));
            createPin(c.lat, c.lng + earth.rotation.y * (180/Math.PI));
            searchInput.value = '';
            searchResults.classList.remove('visible');
            document.getElementById('promptTooltip').style.opacity = '0';
        });
        searchResults.appendChild(item);
    });
    searchResults.classList.add('visible');
});

    }
});

/* ── Rotate to Country ── */
function rotateToCountry(c) {
    const phi = (90 - c.lat) * (Math.PI / 180);
    const theta = (c.lng + 180) * (Math.PI / 180);
    const r = 2.8;
    const targetX = -(r * Math.sin(phi) * Math.cos(theta));
    const targetY =  r * Math.cos(phi);
    const targetZ =  r * Math.sin(phi) * Math.sin(theta);

    // Temporarily disable auto rotate
    controls.autoRotate = false;

    const startPos = camera.position.clone();
    const endPos = new THREE.Vector3(targetX, targetY, targetZ);
    let t = 0;

    function animateRotation() {
        t += 0.02;
        if (t >= 1) {
            camera.position.copy(endPos);
            camera.lookAt(0, 0, 0);
            controls.update();
            setTimeout(() => { controls.autoRotate = true; }, 3000);
            return;
        }
        const eased = 1 - Math.pow(1 - t, 3);
        camera.position.lerpVectors(startPos, endPos, eased);
        camera.lookAt(0, 0, 0);
        controls.update();
        requestAnimationFrame(animateRotation);
    }
    animateRotation();
}

/* ═══════════════════════════════════════════
   ANIMATION LOOP
   ═══════════════════════════════════════════ */
let time = 0;

function animate() {
    requestAnimationFrame(animate);
    time += 0.01;

    earth.rotation.y += 0.002;
    clouds.rotation.y += 0.003;
    clouds.rotation.x = Math.sin(time * 0.1) * 0.01;

    // Pin group follows earth rotation
    pinGroup.rotation.y = earth.rotation.y;

    starsMaterial.opacity = 0.6 + Math.sin(time * 1.5) * 0.15;

    controls.update();
    renderer.render(scene, camera);
}

});

/* ── Keyboard ── */
window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        controls.autoRotate = !controls.autoRotate;
    }
    if (e.code === 'Escape') {
        document.getElementById('infoPanel').classList.remove('open');
        while(pinGroup.children.length) pinGroup.remove(pinGroup.children[0]);
    }
});

animate();
</script>
</body>
